# Configuración de pytest para Facturas GanaTodo
[tool:pytest]
# Donde buscar tests
testpaths = tests

# Patrón de archivos de test
python_files = test_*.py

# Patrón de funciones de test
python_functions = test_*

# Patrón de clases de test
python_classes = Test*

# Opciones por defecto
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=app
    --cov-report=term-missing
    --cov-report=html

# Markers personalizados
markers =
    slow: tests que tardan más de 1 segundo
    integration: tests de integración
    unit: tests unitarios
    database: tests que usan base de datos
    pdf: tests relacionados con PDFs

# Configuración de cobertura
[coverage:run]
source = app
omit =
    */tests/*
    */__pycache__/*
    */venv/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
